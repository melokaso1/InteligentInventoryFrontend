<!doctype html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>El Plonsazo</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        var t = localStorage.getItem('erp-theme');
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(t === 'dark' ? 'dark' : 'light');
      } catch (e) {}
    </script>
    <script>
      (function () {
        if (!/ngrok/i.test(location.hostname)) return;
        var HDR = 'ngrok-skip-browser-warning';
        var nativeFetch = window.fetch;
        if (typeof nativeFetch !== 'function') return;
        window.fetch = function (input, init) {
          init = init || {};
          var headers = new Headers(
            init.headers || (input instanceof Request ? input.headers : undefined),
          );
          if (!headers.has(HDR)) headers.set(HDR, 'true');
          init.headers = headers;
          return nativeFetch.call(window, input, init);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
